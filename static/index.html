<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🧒 ELI5 AI Explainer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.4s ease-out; }

    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.4; }
      40%           { opacity: 1; }
    }
    .dot-pulse span { animation: pulse 1.4s infinite; }
    .dot-pulse span:nth-child(2) { animation-delay: 0.2s; }
    .dot-pulse span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes slideDown {
      from { opacity: 0; max-height: 0; }
      to   { opacity: 1; max-height: 200px; }
    }
    .slide-down { animation: slideDown 0.3s ease-out; }

    .card-hover { transition: transform 0.15s, box-shadow 0.15s; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }

    /* Smooth transitions for all interactive elements */
    button, input { transition: all 0.2s ease; }
  </style>
</head>
<body class="bg-gradient-to-br from-blue-50 via-purple-50 to-pink-50 min-h-screen flex flex-col items-center py-8 px-4">

  <!-- Header -->
  <div class="text-center mb-6">
    <h1 class="text-4xl font-extrabold bg-gradient-to-r from-purple-600 to-pink-500 bg-clip-text text-transparent">
      🧒 ELI5 AI Explainer
    </h1>
    <p class="text-gray-500 mt-1">Объясним сложные слова простым языком!</p>
  </div>

  <!-- Stats Bar -->
  <div id="statsBar" class="flex gap-4 mb-4 text-sm text-gray-600">
    <span class="bg-white px-3 py-1 rounded-full shadow">📊 Объяснений: <strong id="statTotal">0</strong></span>
    <span class="bg-white px-3 py-1 rounded-full shadow">✨ Уникальных: <strong id="statUnique">0</strong></span>
  </div>

  <!-- Input Card -->
  <div class="bg-white rounded-2xl shadow-lg p-6 w-full max-w-xl card-hover">
    <label for="termInput" class="block text-sm font-semibold text-gray-700 mb-1">Введите слово или термин</label>
    <div class="flex gap-2">
      <input
        id="termInput"
        type="text"
        placeholder="Например: гравитация, блокчейн, квант…"
        class="flex-1 border border-gray-300 rounded-xl px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-400"
      />
      <button
        id="explainBtn"
        onclick="explainTerm()"
        class="bg-gradient-to-r from-purple-600 to-pink-500 hover:from-purple-700 hover:to-pink-600 text-white font-semibold rounded-xl px-5 py-2 shadow"
      >
        Объяснить
      </button>
    </div>

    <!-- Loading indicator -->
    <div id="loader" class="hidden mt-4 text-purple-600 font-medium dot-pulse">
      ИИ думает<span>.</span><span>.</span><span>.</span>
    </div>

    <!-- Result -->
    <div id="result" class="hidden mt-5 bg-gradient-to-r from-purple-50 to-pink-50 border border-purple-200 rounded-xl p-4 fade-in">
      <h2 id="resultTerm" class="text-lg font-bold text-purple-800 mb-1"></h2>
      <p id="resultExplanation" class="text-gray-700 leading-relaxed"></p>
    </div>
  </div>

  <!-- Popular Terms -->
  <div id="popularSection" class="mt-5 w-full max-w-xl">
    <h3 class="text-sm font-semibold text-gray-500 mb-2 text-center">🔥 Популярные запросы</h3>
    <div id="popularTerms" class="flex flex-wrap justify-center gap-2"></div>
  </div>

  <!-- History Controls -->
  <div class="flex gap-3 mt-6 flex-wrap justify-center">
    <button
      id="historyBtn"
      onclick="toggleHistory()"
      class="text-purple-600 hover:text-purple-800 font-semibold underline"
    >
      Показать историю
    </button>
    <button
      id="clearHistoryBtn"
      onclick="clearHistory()"
      class="text-red-500 hover:text-red-700 font-semibold underline hidden"
    >
      Очистить всё
    </button>
  </div>

  <!-- Search Bar (inside history) -->
  <div id="searchContainer" class="hidden mt-3 w-full max-w-xl">
    <div class="relative">
      <input
        id="searchInput"
        type="text"
        placeholder="🔍 Поиск по истории…"
        oninput="debounceSearch()"
        class="w-full border border-gray-300 rounded-xl px-4 py-2 pr-10 focus:outline-none focus:ring-2 focus:ring-purple-400"
      />
      <button
        onclick="document.getElementById('searchInput').value=''; searchHistory()"
        class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600"
      >
        ✕
      </button>
    </div>
  </div>

  <!-- History List -->
  <div id="historyContainer" class="hidden mt-3 w-full max-w-xl space-y-3">
    <!-- items injected here -->
  </div>

  <!-- Footer -->
  <footer class="mt-10 text-center text-xs text-gray-400">
    <p>ELI5 AI Explainer v2.0 — Объясняем просто 🚀</p>
  </footer>

  <script>
    // ---------- Explain ----------
    async function explainTerm() {
      const term = document.getElementById("termInput").value.trim();
      if (!term) return;

      const loader  = document.getElementById("loader");
      const result  = document.getElementById("result");
      const termEl  = document.getElementById("resultTerm");
      const explEl  = document.getElementById("resultExplanation");

      loader.classList.remove("hidden");
      result.classList.add("hidden");

      try {
        const res  = await fetch("/api/explain", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ term })
        });
        const data = await res.json();

        termEl.textContent = data.term;
        explEl.textContent = data.explanation;

        loader.classList.add("hidden");
        result.classList.remove("hidden");

        // Refresh stats, popular, and history if visible
        loadStats();
        loadPopular();
        if (historyVisible) searchHistory();
      } catch (err) {
        loader.classList.add("hidden");
        alert("Ошибка при запросе к серверу: " + err.message);
      }
    }

    document.getElementById("termInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") explainTerm();
    });

    // ---------- Stats ----------
    async function loadStats() {
      try {
        const res = await fetch("/api/stats");
        const data = await res.json();
        document.getElementById("statTotal").textContent = data.total_explanations;
        document.getElementById("statUnique").textContent = data.unique_terms;
      } catch (e) { /* silently ignore */ }
    }

    // ---------- Popular Terms ----------
    async function loadPopular() {
      try {
        const res = await fetch("/api/popular");
        const data = await res.json();
        const container = document.getElementById("popularTerms");

        if (data.length === 0) {
          document.getElementById("popularSection").classList.add("hidden");
          return;
        }

        document.getElementById("popularSection").classList.remove("hidden");
        container.innerHTML = "";
        data.forEach(item => {
          const chip = document.createElement("button");
          chip.className = "bg-white border border-purple-200 text-purple-700 px-3 py-1 rounded-full text-sm hover:bg-purple-100 transition";
          chip.textContent = `${item.term} (${item.count})`;
          chip.onclick = () => {
            document.getElementById("termInput").value = item.term;
            explainTerm();
          };
          container.appendChild(chip);
        });
      } catch (e) { /* silently ignore */ }
    }

    // ---------- History with Search ----------
    let historyVisible = false;
    let searchTimeout = null;

    function debounceSearch() {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => searchHistory(), 300);
    }

    async function toggleHistory() {
      historyVisible = !historyVisible;
      const btn   = document.getElementById("historyBtn");
      const cont  = document.getElementById("historyContainer");
      const searchCont = document.getElementById("searchContainer");
      const clearBtn = document.getElementById("clearHistoryBtn");

      if (!historyVisible) {
        cont.classList.add("hidden");
        searchCont.classList.add("hidden");
        clearBtn.classList.add("hidden");
        btn.textContent = "Показать историю";
        return;
      }

      btn.textContent = "Скрыть историю";
      searchCont.classList.remove("hidden");
      clearBtn.classList.remove("hidden");
      searchHistory();
    }

    async function searchHistory() {
      const cont = document.getElementById("historyContainer");
      const query = document.getElementById("searchInput")?.value.trim() || "";

      try {
        let url = query ? `/api/search?q=${encodeURIComponent(query)}` : "/api/history";
        const res = await fetch(url);
        const data = await res.json();

        cont.classList.remove("hidden");

        if (data.length === 0) {
          const msg = query ? "Ничего не найдено 😔" : "Пока ничего нет — объясните первое слово!";
          cont.innerHTML = `<p class="text-center text-gray-400 py-6">${msg}</p>`;
        } else {
          cont.innerHTML = "";
          data.forEach(item => {
            const card = document.createElement("div");
            card.className = "bg-white rounded-xl shadow p-4 fade-in card-hover relative group";
            card.innerHTML =
              `<div class="flex justify-between items-start">` +
                `<h3 class="font-bold text-purple-700 pr-6">${escapeHtml(item.term)}</h3>` +
                `<button onclick="deleteEntry(${item.id})" class="absolute top-2 right-2 text-gray-300 hover:text-red-500 text-lg opacity-0 group-hover:opacity-100 transition" title="Удалить">✕</button>` +
              `</div>` +
              `<p class="text-gray-700 text-sm mt-1 leading-relaxed">${escapeHtml(item.explanation)}</p>`;
            cont.appendChild(card);
          });
        }
      } catch (err) {
        alert("Ошибка при загрузке истории: " + err.message);
      }
    }

    async function deleteEntry(id) {
      if (!confirm("Удалить эту запись?")) return;
      try {
        await fetch(`/api/history/${id}`, { method: "DELETE" });
        searchHistory();
        loadStats();
        loadPopular();
      } catch (err) {
        alert("Ошибка при удалении: " + err.message);
      }
    }

    async function clearHistory() {
      if (!confirm("Удалить ВСЮ историю? Это действие нельзя отменить.")) return;
      try {
        await fetch("/api/history", { method: "DELETE" });
        searchHistory();
        loadStats();
        loadPopular();
      } catch (err) {
        alert("Ошибка при очистке: " + err.message);
      }
    }

    // Simple XSS prevention
    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    // ---------- Init ----------
    document.addEventListener("DOMContentLoaded", () => {
      loadStats();
      loadPopular();
    });
  </script>
</body>
</html>
