<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ELI5 AI Explainer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Fade-in animation for results */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.4s ease-out; }

    /* Pulsing dots animation */
    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.4; }
      40%           { opacity: 1; }
    }
    .dot-pulse span { animation: pulse 1.4s infinite; }
    .dot-pulse span:nth-child(2) { animation-delay: 0.2s; }
    .dot-pulse span:nth-child(3) { animation-delay: 0.4s; }
  </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-purple-100 min-h-screen flex flex-col items-center py-10 px-4">

  <!-- Header -->
  <h1 class="text-4xl font-extrabold text-purple-700 mb-2">🧒 ELI5 AI Explainer</h1>
  <p class="text-gray-500 mb-8">Объясним сложные слова простым языком!</p>

  <!-- Input Card -->
  <div class="bg-white rounded-2xl shadow-lg p-6 w-full max-w-xl">
    <label for="termInput" class="block text-sm font-semibold text-gray-700 mb-1">Введите слово или термин</label>
    <div class="flex gap-2">
      <input
        id="termInput"
        type="text"
        placeholder="Например: гравитация, блокчейн, квант…"
        class="flex-1 border border-gray-300 rounded-xl px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-400"
      />
      <button
        id="explainBtn"
        onclick="explainTerm()"
        class="bg-purple-600 hover:bg-purple-700 text-white font-semibold rounded-xl px-5 py-2 transition"
      >
        Объяснить
      </button>
    </div>

    <!-- Loading indicator -->
    <div id="loader" class="hidden mt-4 text-purple-600 font-medium dot-pulse">
      ИИ думает<span>.</span><span>.</span><span>.</span>
    </div>

    <!-- Result -->
    <div id="result" class="hidden mt-5 bg-purple-50 border border-purple-200 rounded-xl p-4 fade-in">
      <h2 id="resultTerm" class="text-lg font-bold text-purple-800 mb-1"></h2>
      <p id="resultExplanation" class="text-gray-700"></p>
    </div>
  </div>

  <!-- History Button -->
  <button
    id="historyBtn"
    onclick="toggleHistory()"
    class="mt-6 text-purple-600 hover:text-purple-800 font-semibold underline"
  >
    Показать историю
  </button>

  <!-- History List -->
  <div id="historyContainer" class="hidden mt-4 w-full max-w-xl space-y-3">
    <!-- items injected here -->
  </div>

  <script>
    // ---------- Explain ----------
    async function explainTerm() {
      const term = document.getElementById("termInput").value.trim();
      if (!term) return;

      const loader  = document.getElementById("loader");
      const result  = document.getElementById("result");
      const termEl  = document.getElementById("resultTerm");
      const explEl  = document.getElementById("resultExplanation");

      // UI: show loader, hide previous result
      loader.classList.remove("hidden");
      result.classList.add("hidden");

      try {
        const res  = await fetch("/api/explain", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ term })
        });
        const data = await res.json();

        termEl.textContent = data.term;
        explEl.textContent = data.explanation;

        loader.classList.add("hidden");
        result.classList.remove("hidden");
      } catch (err) {
        loader.classList.add("hidden");
        alert("Ошибка при запросе к серверу: " + err.message);
      }
    }

    // Allow pressing Enter
    document.getElementById("termInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") explainTerm();
    });

    // ---------- History ----------
    let historyVisible = false;

    async function toggleHistory() {
      historyVisible = !historyVisible;
      const btn   = document.getElementById("historyBtn");
      const cont  = document.getElementById("historyContainer");

      if (!historyVisible) {
        cont.classList.add("hidden");
        btn.textContent = "Показать историю";
        return;
      }

      btn.textContent = "Скрыть историю";

      try {
        const res  = await fetch("/api/history");
        const data = await res.json();

        if (data.length === 0) {
          cont.innerHTML = '<p class="text-center text-gray-400">Пока ничего нет — объясните первое слово!</p>';
        } else {
          cont.innerHTML = "";
          data.forEach(item => {
            const card = document.createElement("div");
            card.className = "bg-white rounded-xl shadow p-4 fade-in";
            card.innerHTML =
              `<h3 class="font-bold text-purple-700">${escapeHtml(item.term)}</h3>` +
              `<p class="text-gray-700 text-sm mt-1">${escapeHtml(item.explanation)}</p>`;
            cont.appendChild(card);
          });
        }

        cont.classList.remove("hidden");
      } catch (err) {
        alert("Ошибка при загрузке истории: " + err.message);
      }
    }

    // Simple XSS prevention
    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
